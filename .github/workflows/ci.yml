name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: py${{ matrix.python }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev,dashboard]"
      - name: Test
        run: pytest -q

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ballast .
      - name: Smoke test
        run: |
          docker run -d --rm -p 8080:8080 --name ballast ballast
          for i in $(seq 1 30); do
            curl -sf http://localhost:8080/api/status && break
            sleep 1
          done
          curl -sf http://localhost:8080/api/status | grep -q session_id
          docker stop ballast
